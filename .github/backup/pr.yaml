name: "PR"

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr:
    name: "PR"
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: "Debug event.json"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        if: ${{ !github.event.act }}
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: env

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pr-agent (same @main version as Docker image)
        run: |
          pip install "pr-agent @ git+https://github.com/The-PR-Agent/pr-agent.git@main"

      - name: Run PR Agent (no API key)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "hosted_vllm/big-pickle"
          config.fallback_models: '["hosted_vllm/big-pickle"]'
          OPENAI__API_BASE: "https://opencode.ai/zen/v1"
          config.custom_model_max_tokens: "128000"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
        shell: python
        run: |
          import os
          os.environ['OPENAI_API_KEY'] = 'not-needed'

          import litellm
          from litellm.llms.openai.chat.gpt_transformation import OpenAIGPTConfig
          from litellm.llms.hosted_vllm.chat.transformation import HostedVLLMChatConfig

          orig = OpenAIGPTConfig.validate_environment
          def patched_validate(self, headers, model, messages, optional_params, litellm_params, api_key=None, api_base=None):
              if 'content-type' not in headers and 'Content-Type' not in headers:
                  headers['Content-Type'] = 'application/json'
              return headers
          OpenAIGPTConfig.validate_environment = patched_validate

          def patched_provider_info(self, api_base, api_key):
              return api_base, None
          HostedVLLMChatConfig._get_openai_compatible_provider_info = patched_provider_info

          from pr_agent.servers.github_action_runner import run_action
          import asyncio
          asyncio.run(run_action())
